services:
  - type: web
    name: welfarebot
    env: python
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    buildCommand: "pip install --no-cache-dir -r requirements.txt && cd frontend && npm install --omit=dev && npm run build && cd .. && rmdir /s /q frontend\\node_modules"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
