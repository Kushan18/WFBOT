services:
  - type: web
    name: welfarebot
    env: python
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    buildCommand: "pip install -r requirements.txt && cd frontend && npm install && npm run build && cd .."
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
